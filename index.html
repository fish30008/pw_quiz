<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>REST & State Management Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #7F77DD; --purple-dark: #534AB7; --purple-deep: #3C3489;
    --purple-light: #EEEDFE; --purple-text: #26215C;
    --teal: #1D9E75; --teal-light: #E1F5EE; --teal-text: #085041;
    --red: #E24B4A; --red-light: #FCEBEB; --red-text: #791F1F;
    --amber-light: #FAEEDA; --amber-text: #633806;
    --green-light: #EAF3DE; --green-text: #27500A;
    --bg: #f5f5f7; --card: #ffffff;
    --text: #1a1a1a; --text2: #555; --text3: #888;
    --border: #e0e0e0; --border2: #ccc;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  #app { max-width: 480px; margin: 0 auto; padding: 14px 12px 32px; }

  /* START SCREEN */
  .start-hero { text-align: center; padding: 28px 0 22px; }
  .hero-num { font-size: 64px; font-weight: 700; color: var(--purple); line-height: 1; }
  .hero-sub { font-size: 15px; color: var(--text2); margin-top: 6px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin: 18px 0 8px; }
  .pill-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill { font-size: 13px; padding: 7px 13px; border-radius: 22px; border: 1.5px solid var(--border2); background: var(--card); color: var(--text2); cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .pill:active { transform: scale(.96); }
  .pill.on { background: var(--purple); color: #fff; border-color: var(--purple); }
  .q-count { text-align: center; font-size: 14px; color: var(--text3); margin: 18px 0 14px; }
  .btn-start { display: block; width: 100%; padding: 15px; border-radius: 14px; border: none; background: var(--purple); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: background .15s; -webkit-tap-highlight-color: transparent; }
  .btn-start:active { background: var(--purple-dark); }

  /* PROGRESS */
  .prog-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .prog-row span { font-size: 12px; color: var(--text3); font-weight: 500; }
  .pbar { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
  .pfill { height: 6px; background: var(--purple); border-radius: 3px; transition: width .35s ease; }

  /* QUESTION CARD */
  .qcard { background: var(--card); border-radius: 18px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
  .meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .tag-topic { background: var(--purple-light); color: var(--purple-text); }
  .tag-easy { background: var(--green-light); color: var(--green-text); }
  .tag-medium { background: var(--amber-light); color: var(--amber-text); }
  .tag-hard { background: var(--red-light); color: var(--red-text); }
  .q-text { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.5; }
  .opts { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .opt { display: flex; align-items: flex-start; gap: 10px; padding: 12px 13px; border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer; background: var(--card); transition: border-color .15s, background .15s; -webkit-tap-highlight-color: transparent; }
  .opt:active { background: #f9f9f9; }
  .opt.correct { border-color: var(--teal); background: var(--teal-light); }
  .opt.wrong { border-color: var(--red); background: var(--red-light); }
  .opt.show-correct { border-color: var(--teal); background: var(--teal-light); }
  .ltr { min-width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; background: var(--bg); color: var(--text2); border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 1px; }
  .opt.correct .ltr { background: var(--teal); color: #fff; border-color: var(--teal); }
  .opt.wrong .ltr { background: var(--red); color: #fff; border-color: var(--red); }
  .opt.show-correct .ltr { background: var(--teal); color: #fff; border-color: var(--teal); }
  .opt-text { font-size: 14px; color: var(--text); line-height: 1.45; padding-top: 3px; }
  .exp-box { background: var(--purple-light); border-radius: 12px; padding: 13px 14px; margin-top: 12px; display: none; }
  .exp-box p { font-size: 13px; color: var(--purple-deep); line-height: 1.65; }
  .exp-box strong { font-weight: 700; color: var(--purple-text); }
  .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .footer span { font-size: 12px; color: var(--text3); }
  .btn-next { padding: 11px 26px; border-radius: 24px; border: none; background: var(--purple); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; -webkit-tap-highlight-color: transparent; }
  .btn-next:disabled { opacity: .3; cursor: default; }
  .btn-next:active:not(:disabled) { background: var(--purple-dark); }

  /* SCORE SCREEN */
  .score-hero { text-align: center; padding: 28px 0 20px; }
  .score-big { font-size: 58px; font-weight: 700; color: var(--text); }
  .score-pct { font-size: 16px; color: var(--text2); margin-top: 6px; }
  .score-msg { font-size: 15px; color: var(--purple); font-weight: 600; margin-top: 8px; }
  .topic-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 12px 0 20px; }
  .tcrd { background: var(--card); border-radius: 13px; padding: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
  .tname { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .tscore { font-size: 20px; font-weight: 700; color: var(--text); }
  .tbar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 7px; }
  .tbar { height: 4px; border-radius: 2px; background: var(--purple); }
  .all-results { display: flex; flex-direction: column; gap: 0; }
  .result-row { display: flex; align-items: center; gap: 9px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .rdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .rdot.ok { background: var(--teal); }
  .rdot.no { background: var(--red); }
  .rq { font-size: 12px; color: var(--text2); flex: 1; line-height: 1.35; }
  .btn-row { display: flex; flex-direction: column; gap: 8px; margin-top: 22px; }
  .btn-sec { width: 100%; padding: 13px; border-radius: 13px; border: 1.5px solid var(--border2); background: transparent; color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-sec:active { background: var(--bg); }
</style>
</head>
<body>
<div id="app"></div>
<script>
const Q = [
  // REST BASICS
  {t:"REST basics",d:"easy",q:"What does REST stand for?",o:["Remote Execution State Transfer","Representational State Transfer","Resource Endpoint Standard Transport","Reactive Event Stream Technology"],c:1,e:"<strong>Representational State Transfer</strong> — an architectural style coined by Roy Fielding in his 2000 dissertation. Not a protocol; a set of constraints for designing networked APIs."},
  {t:"REST basics",d:"easy",q:"In REST, URLs represent...",o:["Actions to perform","Database queries","Resources — things (nouns)","Functions to invoke"],c:2,e:"<strong>URLs are nouns.</strong> /books, /users/5 identify things. The HTTP verb (GET, POST, DELETE) carries the action. Verb in URL = RPC, not REST."},
  {t:"REST basics",d:"easy",q:"Which HTTP method creates a new resource?",o:["GET","PUT","DELETE","POST"],c:3,e:"<strong>POST /collection</strong> creates a new resource. The server assigns the ID and returns 201 Created with a Location header."},
  {t:"REST basics",d:"easy",q:"Which method fully replaces an existing resource?",o:["PATCH","PUT","POST","GET"],c:1,e:"<strong>PUT replaces the whole resource.</strong> Sending PUT with partial data wipes missing fields. PATCH applies partial updates only."},
  {t:"REST basics",d:"easy",q:"Correct REST route to get book with ID 7?",o:["GET /books/getById?id=7","GET /books/fetch/7","GET /books/7","POST /books/7"],c:2,e:"<strong>GET /books/7</strong> — ID is part of the path, GET is read-only and must never modify data."},
  {t:"REST basics",d:"easy",q:"Which method applies a partial update?",o:["GET","DELETE","POST","PATCH"],c:3,e:"<strong>PATCH</strong> updates only the fields you send. PUT replaces everything. Use PATCH when you only want to change one or two fields."},
  {t:"REST basics",d:"medium",q:"PUT vs PATCH — key difference?",o:["PUT creates, PATCH updates","PUT requires auth, PATCH doesn't","PUT replaces the whole resource; PATCH partially updates it","PUT creates a new version every time"],c:2,e:"<strong>PUT = full replacement, PATCH = partial update.</strong> Both are idempotent — same call, same server-state effect."},
  {t:"REST basics",d:"medium",q:"Two most important REST constraints in practice?",o:["Stateless + cacheable","Nouns in URLs + HTTP verbs carry the action","Uniform interface + layered system","Client-server + code on demand"],c:1,e:"<strong>Nouns in URLs + verbs via HTTP methods.</strong> Follow these two and the rest — statelessness, cacheability — follows naturally."},
  {t:"REST basics",d:"medium",q:"Best method to update only a user's email?",o:["PUT","DELETE","POST","PATCH"],c:3,e:"<strong>PATCH</strong> — partial update. Only the fields sent will change. PUT would require sending all fields or risk wiping others."},
  {t:"REST basics",d:"medium",q:"What makes an API truly RESTful vs just HTTP JSON?",o:["Using JSON instead of XML","Using HTTPS","Resource-as-noun URLs + HTTP verbs as actions + proper status codes","Having an /api prefix"],c:2,e:"<strong>REST = nouns in URLs + verbs as HTTP methods + proper status codes.</strong> Format is irrelevant. Many so-called REST APIs are actually RPC over HTTP."},
  {t:"REST basics",d:"hard",q:"GET /books returns different data each call as books are added. REST violation?",o:["Yes — GET must return identical responses","Yes — GET must be cacheable so results must be static","No — GET must be safe (no side effects), not return identical data","No — REST has no consistency rules"],c:2,e:"<strong>GET must be safe — no side effects.</strong> Response bodies can vary as the underlying resource changes. Idempotency means repeated calls don't change server state, not that responses are identical."},
  {t:"REST basics",d:"hard",q:"Why is POST /auth/token a valid RESTful route?",o:["POST should only create user resources","Auth must use GET","You are creating a new token resource — POST creates, /token is the resource noun","REST forbids action-style routes"],c:2,e:"<strong>POST /auth/token is RESTful.</strong> The verb is POST (create), the resource is a token. Issuing a JWT = creating a token resource."},
  {t:"REST basics",d:"hard",q:"Developer says 'My API uses JSON so it's REST.' What's missing?",o:["REST requires XML, not JSON","JSON is not allowed in REST","REST is about URL structure and HTTP verb semantics — data format is irrelevant","Correct — JSON equals REST"],c:2,e:"<strong>JSON is irrelevant to REST.</strong> REST requires resource-based URLs, HTTP verb semantics, and proper status codes. RPC can use JSON too."},
  {t:"REST basics",d:"hard",q:"Why is REST described as 'stateless'?",o:["The server never stores any data","Each request must be self-contained — server holds no session state between calls","The client never stores cookies","REST APIs don't use databases"],c:1,e:"<strong>Stateless = each request is self-contained.</strong> No memory of previous requests. Auth, context, and params must be sent every time. Makes horizontal scaling trivial."},

  // HTTP STATUS CODES
  {t:"HTTP status codes",d:"easy",q:"Successful POST creating a resource — correct code?",o:["200 OK","204 No Content","201 Created","202 Accepted"],c:2,e:"<strong>201 Created</strong> — new resource made. Include a Location header pointing to it."},
  {t:"HTTP status codes",d:"easy",q:"204 No Content means...",o:["Resource not found","Request redirected","Success, no response body to return","Server encountered an error"],c:2,e:"<strong>204 = success, nothing to return.</strong> Common for DELETE — the resource is gone, there's nothing to send back."},
  {t:"HTTP status codes",d:"easy",q:"Missing or expired JWT — which code?",o:["400","403","404","401"],c:3,e:"<strong>401 Unauthorized</strong> — authentication failed. No valid token was provided. 403 means a valid token exists but lacks permission."},
  {t:"HTTP status codes",d:"easy",q:"User registers with an already-taken email — which code?",o:["400","409","403","500"],c:1,e:"<strong>409 Conflict</strong> — a state conflict with existing data (duplicate unique field). 400 is for malformed input like missing fields."},
  {t:"HTTP status codes",d:"easy",q:"200 OK means...",o:["Resource was created","Success with no body","Request was redirected","Success with a response body"],c:3,e:"<strong>200 OK = success with a body.</strong> Used for GET, PUT, PATCH that return the resource. 201 for creation, 204 for no-body success."},
  {t:"HTTP status codes",d:"medium",q:"Main problem with always returning 200 and hiding errors in the body?",o:["Wastes bandwidth","Monitoring tools, gateways, and load balancers read HTTP codes — they can't detect failures if everything is 200","Breaks CORS preflight","Forces clients to use XML"],c:1,e:"<strong>Infrastructure reads HTTP codes, not JSON bodies.</strong> Alerting, API gateways, load balancers — all blind if everything is 200."},
  {t:"HTTP status codes",d:"medium",q:"When is returning 404 for unauthorized access intentional?",o:["Server is under load","To hide that the resource even exists — security by obscurity","The JWT is expired","Pagination is not implemented"],c:1,e:"<strong>404 prevents resource-existence leakage.</strong> If /admin/users/5 returns 403, an attacker knows user 5 exists. Returning 404 reveals nothing."},
  {t:"HTTP status codes",d:"medium",q:"Client sends malformed JSON in a POST body — correct code?",o:["500","404","400","401"],c:2,e:"<strong>400 Bad Request</strong> — invalid data from the client. Covers malformed JSON, missing required fields, wrong data types."},
  {t:"HTTP status codes",d:"medium",q:"Valid JWT but insufficient role — which code?",o:["401","400","404","403"],c:3,e:"<strong>403 Forbidden</strong> — authenticated but not authorized. Token is valid, but role/permissions don't allow this action."},
  {t:"HTTP status codes",d:"hard",q:"Server hits an unhandled exception — what should it do?",o:["Retry automatically","Return 200 with an error field to hide the issue","Log error server-side and return a generic 500 — never expose stack traces","Return the full stack trace for debugging"],c:2,e:"<strong>Log internally, respond generically.</strong> Stack traces expose file paths, library versions, SQL schema to potential attackers. Return {error:'Internal server error'} and log everything server-side."},
  {t:"HTTP status codes",d:"hard",q:"POST /books succeeds but server returns 200 instead of 201. What breaks?",o:["JWT expires faster","Clients using 201 to auto-follow Location headers won't work; creation semantics break","POST with 200 triggers browser resubmission","Causes 409 on next request"],c:1,e:"<strong>201 is the creation contract.</strong> API clients and automation tools use status codes semantically. Breaking this contract means Location header auto-follow won't work."},
  {t:"HTTP status codes",d:"hard",q:"Client receives 401 — correct client behavior?",o:["Retry the same request immediately","Show a 'resource not found' error","Redirect to login or trigger token refresh — the user must re-authenticate","Mark resource as forbidden and stop"],c:2,e:"<strong>401 = re-authenticate.</strong> Use a refresh token to get a new JWT, or redirect to login, then retry the original request."},
  {t:"HTTP status codes",d:"hard",q:"API returns 500 for every validation error. What's wrong?",o:["500 only works with XML","Nothing — 500 is generic","500 implies a server bug — validation errors are the client's fault and should be 400 with actionable info","500 errors disable browser caching"],c:2,e:"<strong>500 = server broke unexpectedly.</strong> Validation failures are the client's fault. 400 tells them exactly what to fix. 500 gives no guidance."},

  // COMMON MISTAKES
  {t:"Common mistakes",d:"easy",q:"Which URL violates REST naming?",o:["GET /users","DELETE /users/5","POST /users/create","PATCH /users/5"],c:2,e:"<strong>POST /users/create puts a verb in the URL.</strong> The HTTP method IS the verb. Correct form: POST /users."},
  {t:"Common mistakes",d:"easy",q:"Why is GET /deleteUser?id=5 dangerous?",o:["Query params are forbidden in REST","GET is slower than DELETE","Browsers, caches, and crawlers repeat GET freely — a GET delete can be triggered accidentally","It breaks the plural naming convention"],c:2,e:"<strong>GET must have no side effects.</strong> Browsers prefetch, crawlers follow, caches replay GET URLs. Destructive GET can wipe data without user intent."},
  {t:"Common mistakes",d:"medium",q:"/getUsers, /user/5, /Users/create, /USER-LIST — core problem?",o:["Too many HTTP verbs used","Inconsistent — mixed case, plural/singular, and verbs in paths","Routes are too short","Hyphens are not allowed"],c:1,e:"<strong>Consistency is a REST convention.</strong> Pick one scheme and apply everywhere: lowercase, plural nouns, hyphens for multi-word segments."},
  {t:"Common mistakes",d:"medium",q:"Maximum recommended nesting depth for REST routes?",o:["Five levels","One level","No limit — REST allows unlimited nesting","Two levels"],c:3,e:"<strong>Two levels max.</strong> /posts/12/comments is fine. Deeper becomes unmaintainable and breaks when resources are reorganized. Flatten: GET /likes/3 or GET /comments/8/likes."},
  {t:"Common mistakes",d:"medium",q:"RESTful equivalent of POST /users/5/delete?",o:["GET /users/5/remove","POST /users/deleteById","DELETE /users/5","PUT /users/5/delete"],c:2,e:"<strong>DELETE /users/5</strong> — the HTTP verb carries the action. No /delete path segment needed."},
  {t:"Common mistakes",d:"medium",q:"GET /users?active=true changed to GET /users/getAllActive. What's violated?",o:["Query params can't filter in REST","No violation","URLs should be nouns — /getAllActive is a verb phrase, making this RPC not REST","GET can't accept boolean parameters"],c:2,e:"<strong>REST URLs are nouns.</strong> ?active=true filters the resource. /getAllActive encodes an action in the URL — that's RPC style."},
  {t:"Common mistakes",d:"hard",q:"GET /users/5/posts/12/comments/8/likes/3 — best fix?",o:["Add even more nesting for clarity","Use POST instead of GET","Flatten: GET /likes/3 or GET /comments/8/likes — past two levels it breaks","Convert the whole API to GraphQL"],c:2,e:"<strong>Flatten nested routes.</strong> Address resources directly or with one level of context. Past two levels: unmaintainable and breaks on reorganization."},
  {t:"Common mistakes",d:"hard",q:"API uses /book-review, /BookReview, /book_review, /bookreviews for related resources. Consequence?",o:["The API fails to start","CORS errors on every request","API is unmaintainable — clients can't predict route patterns, every endpoint must be looked up","Hyphens cause 400 errors"],c:2,e:"<strong>Inconsistent naming destroys predictability.</strong> A good API lets developers guess routes correctly. Mixed conventions force looking up every single endpoint."},
  {t:"Common mistakes",d:"hard",q:"Team A: always HTTP 200 + status field. Team B: proper HTTP status codes. Which is easier to integrate?",o:["Team A — one field to check","Team A — JSON more expressive","Team B — standard HTTP codes work natively with all tooling: monitoring, gateways, test frameworks, every HTTP library","They are equal, just style preference"],c:2,e:"<strong>Team B wins on every integration point.</strong> HTTP codes are understood natively by browsers, caches, API gateways, monitoring tools, and every HTTP library ever written. Custom status fields require custom parsing everywhere."},
  {t:"Common mistakes",d:"hard",q:"POST /users returns 200, POST /orders returns 201, POST /products returns 200 with {success:true}. What's the issue?",o:["POST should never return a body","The Location header is wrong","Status codes are inconsistent across endpoints — clients can't rely on predictable behavior","Products endpoint should use PUT"],c:2,e:"<strong>Inconsistency breaks client predictability.</strong> If creation sometimes returns 200, sometimes 201, clients must handle both cases everywhere. Pick one contract and apply it across the whole API."},

  // REST VS OTHER APPROACHES
  {t:"REST vs others",d:"easy",q:"What characterizes RPC-style APIs?",o:["One URL per resource, actions via HTTP verbs","A single /graphql endpoint","Multiple endpoints each named after an action: /getUser, /deleteUser","XML-only payloads"],c:2,e:"<strong>RPC encodes actions in URLs.</strong> /getUser, /createUser — each operation gets its own endpoint. No standard structure; clients can't make assumptions."},
  {t:"REST vs others",d:"medium",q:"Which organizations still commonly use SOAP?",o:["Startups and consumer apps","Gaming platforms","Banking, insurance, and government integrations","GraphQL-heavy companies"],c:2,e:"<strong>SOAP = banking, insurance, government.</strong> Its verbosity is a feature: strict XML contracts, built-in validation, decades of tooling, and legacy systems that can't be migrated."},
  {t:"REST vs others",d:"medium",q:"Key GraphQL advantage for frontend clients?",o:["GraphQL responses are always faster","HTTP caching works better in GraphQL","Client defines exact response shape — no over-fetching or under-fetching","GraphQL requires no server-side schema"],c:2,e:"<strong>Client-defined queries eliminate over/under-fetching.</strong> You request exactly the fields you need. One query can also resolve multiple resources at once."},
  {t:"REST vs others",d:"medium",q:"In GraphQL, what is a mutation?",o:["A query that reads data","A DELETE request via REST","A write operation — create, update, or delete — defined by the client","A SOAP-style envelope"],c:2,e:"<strong>Mutations = GraphQL's write operations.</strong> Queries read data; mutations modify it. Example: mutation { createUser(name: 'Ion') { id } }."},
  {t:"REST vs others",d:"hard",q:"Why doesn't GraphQL benefit from standard HTTP caching?",o:["GraphQL responses are in XML","GraphQL uses WebSockets not HTTP","All queries are POST to a single endpoint — HTTP caching is built around GET + unique URLs","Authentication disables caching"],c:2,e:"<strong>HTTP caching keys on GET + URL.</strong> Every GraphQL call is POST /graphql — no URL uniqueness. You need persisted queries, Apollo Client cache, or edge caching workarounds."},
  {t:"REST vs others",d:"hard",q:"Why is per-field authorization in GraphQL complex?",o:["GraphQL doesn't support auth headers","Every field resolver must independently check permissions — unlike REST where you authorize at the route level","Requires a separate microservice","It conflicts with JWT"],c:1,e:"<strong>REST = one middleware check per route.</strong> GraphQL = one query touches many types. Each resolver needs its own permission logic. Partial responses (some fields allowed, some not) require very careful design."},
  {t:"REST vs others",d:"hard",q:"REST is a poor fit for real-time bidirectional communication because...",o:["REST requires XML","REST is too slow for real-time","REST is request-response — the server can't push updates without polling or long-polling hacks","REST can't handle binary data"],c:2,e:"<strong>REST = client-initiated request-response.</strong> For server-push (live feeds, chat, notifications), use WebSockets or Server-Sent Events. REST polling is wasteful and adds latency."},
  {t:"REST vs others",d:"medium",q:"What is SOAP's main advantage over REST?",o:["Faster responses","Works without HTTP","Strict XML contracts with built-in validation — ideal for enterprise integrations that need formal guarantees","Simpler to implement"],c:2,e:"<strong>SOAP's verbosity is a feature.</strong> Strict WSDL contracts, built-in validation, formal error envelopes. Banking and government value predictability over simplicity."},

  // PAGINATION
  {t:"Pagination",d:"easy",q:"Why must every real API implement pagination?",o:["HTTP limits responses to 1 MB","Pagination is required by the REST spec","JWT requires it","Returning all records doesn't scale — overloads server and client"],c:3,e:"<strong>Unbounded queries don't scale.</strong> Serializing and transferring 10,000 records at once is wasteful. Pagination limits work per request and makes APIs predictable under load."},
  {t:"Pagination",d:"easy",q:"GET /books?limit=10&offset=20 returns which records?",o:["The first 20 books","Books 10–20","Books 21–30 (the third page)","All books after ID 20"],c:2,e:"<strong>offset=20 skips 20, limit=10 returns 10</strong> — records 21–30, the third page. First page = offset=0, second = offset=10."},
  {t:"Pagination",d:"easy",q:"First page in offset-based pagination?",o:["offset=1","offset=10","offset=0","page=1"],c:2,e:"<strong>offset=0</strong> — skip zero records, return the first batch. Pages: 0, 10, 20... for limit=10."},
  {t:"Pagination",d:"medium",q:"What metadata should a paginated response include?",o:["Only a next_page URL","Total count, limit, and offset — so clients can calculate how many pages exist","The full dataset compressed","Server memory usage"],c:1,e:"<strong>Metadata lets clients calculate total pages.</strong> Without 'total', clients don't know if more records exist. Include: { data, total, limit, offset }."},
  {t:"Pagination",d:"medium",q:"What does the cursor in cursor-based pagination represent?",o:["A JWT for the next page","A page number","An encoded stable position in the dataset","Total number of records"],c:2,e:"<strong>Cursor = stable position</strong> — usually base64 of the last record's ID or timestamp. Next request starts from that exact point, regardless of new inserts or deletes."},
  {t:"Pagination",d:"hard",q:"When is cursor-based pagination preferred over offset?",o:["Dataset has fewer than 100 records","Clients need to jump to arbitrary page numbers","Data changes frequently — offset pages shift under live inserts and deletes","When using WebSockets"],c:2,e:"<strong>Offset breaks under live data.</strong> Inserts shift all offsets — items appear twice or are skipped. Cursors encode a stable position, consistent under concurrent writes."},
  {t:"Pagination",d:"hard",q:"Client requests offset=40. Meanwhile 5 records deleted before it. What happens?",o:["The API returns an error","The cursor adjusts automatically","Client skips records that shifted — offset pagination is inconsistent under concurrent deletes","Server returns from the beginning"],c:2,e:"<strong>Offset shifts under deletes.</strong> If 5 records before offset=40 are deleted, offset=40 now points to what was record 45. Records 41–45 silently skipped. Cursor pagination avoids this entirely."},
  {t:"Pagination",d:"hard",q:"API returns 50,000 records without pagination. Client loads all. Problems?",o:["JWT expires during the request","Only one problem: slow network","Memory pressure on client, server CPU spike, no progressive rendering, any network failure aborts everything","Only needed for databases over 1 GB"],c:2,e:"<strong>Multiple problems stack.</strong> Server serializes all records, client parses all records, no partial rendering, network hiccup aborts everything. Paginate from day one."},

  // JWT
  {t:"JWT",d:"easy",q:"Three parts of a JWT?",o:["Username, password, session ID","Token, secret, expiration","Header, payload, signature","Method, resource, claims"],c:2,e:"<strong>Header.Payload.Signature</strong> — each base64url-encoded, joined by dots. Header = algorithm, payload = claims, signature = tamper proof."},
  {t:"JWT",d:"easy",q:"Which HTTP header carries the JWT?",o:["X-Auth-Token: Bearer","Cookie: jwt=","Content-Type: application/jwt","Authorization: Bearer <token>"],c:3,e:"<strong>Authorization: Bearer &lt;token&gt;</strong> is the standard. Server reads it every request, verifies signature, checks exp, extracts claims — no DB lookup needed."},
  {t:"JWT",d:"easy",q:"Is the JWT payload encrypted?",o:["Yes, AES-256 by default","Only when sent over HTTPS","No — base64url-encoded, anyone can decode and read it","Only the signature is encrypted"],c:2,e:"<strong>Base64url = encoding, not encryption.</strong> Anyone who has the token can decode the payload instantly (try jwt.io). Never store sensitive data in JWT payload."},
  {t:"JWT",d:"easy",q:"What is the purpose of the JWT signature?",o:["Encrypts the payload so it's private","Speeds up verification","Proves the token was issued by the server and hasn't been tampered with","Stores the user's password securely"],c:2,e:"<strong>Signature = tamper proof.</strong> Computed from header+payload using the server's secret. Change one byte of the payload and verify() will reject it."},
  {t:"JWT",d:"medium",q:"Difference between verify() and decode()?",o:["decode() checks signature; verify() only reads payload","They are identical — decode is an alias","verify() requires HTTPS; decode() works over HTTP","verify() checks signature AND exp; decode() just reads with no validation"],c:3,e:"<strong>verify() = decode + validate signature + check exp.</strong> decode() accepts expired or forged tokens. Always call verify() server-side."},
  {t:"JWT",d:"medium",q:"exp = iat + 60 means the token...",o:["Expires in 60 days","Expires in 60 minutes","Expires 60 seconds after it was issued","Has 60 retry attempts before expiring"],c:2,e:"<strong>iat = Unix 'issued at' timestamp.</strong> Adding 60 = expires in 60 seconds. Useful for demos showing 401 on expired token."},
  {t:"JWT",d:"medium",q:"Server calls verify() on a JWT with exp in the past. What happens?",o:["Server ignores exp and processes the request","Library returns null","Library throws TokenExpiredError — server should return 401","Server automatically refreshes the token"],c:2,e:"<strong>verify() throws on expired tokens.</strong> Wrap in try/catch. On TokenExpiredError → return 401 so client re-authenticates."},
  {t:"JWT",d:"medium",q:"What should be stored in a JWT payload?",o:["Password hash and salt","Database connection strings","User ID, role, permissions, expiration — non-sensitive identifiers only","Full user profile including address and payment info"],c:2,e:"<strong>Lightweight, non-sensitive claims only.</strong> sub (user ID), role, permissions, exp. The payload is readable by anyone with the token."},
  {t:"JWT",d:"hard",q:"Why is storing JWT in localStorage risky?",o:["localStorage is limited to 4 KB","localStorage is cleared on browser close","Any JavaScript on the page — including XSS-injected scripts — can read and steal it","localStorage is not available on mobile browsers"],c:2,e:"<strong>XSS reads localStorage.</strong> A successful XSS attack runs arbitrary JS. HttpOnly cookies cannot be read by JS at all — immune to this class of attack."},
  {t:"JWT",d:"hard",q:"Client edits JWT payload {role:'USER'} → {role:'ADMIN'} and sends it. What stops this?",o:["Base64 encoding prevents editing","Server checks role against a database","The signature — any payload change invalidates it and verify() throws","The exp claim blocks role changes"],c:2,e:"<strong>The signature is the defense.</strong> Computed from header+payload using server's secret. Change one byte of payload → signature no longer matches → verify() rejects the token."},
  {t:"JWT",d:"hard",q:"Developer stores name, email, address, salary in JWT payload 'for convenience'. Risk?",o:["JWT becomes too large for a cookie","Payload is only base64-encoded — anyone with the token can read all that data","Server can't parse extra fields","Signature validation fails with extra fields"],c:1,e:"<strong>JWT payloads are readable by anyone with the token.</strong> Decode at jwt.io — raw payload visible instantly. Only store non-sensitive identifiers: user ID, role, permissions."},
  {t:"JWT",d:"hard",q:"Why does the security community recommend HttpOnly cookies over localStorage for JWT?",o:["localStorage is too slow","HttpOnly cookies are larger","HttpOnly cookies can't be read by JavaScript at all — XSS attacks steal localStorage but can't access HttpOnly cookies","Cookies work on more browsers"],c:2,e:"<strong>HttpOnly = JS-inaccessible.</strong> XSS can steal localStorage tokens but cannot access HttpOnly cookies. Tradeoff: cookies need CSRF protection, but that's the accepted safer default."},

  // STATE MANAGEMENT
  {t:"State management",d:"easy",q:"What does React's useState do?",o:["Shares state across the entire component tree","Stores state in localStorage automatically","Creates local component state that triggers re-render when updated","Fetches data from an API on mount"],c:2,e:"<strong>useState = local component state.</strong> Calling setState triggers re-render of that component and its children. Use it for UI toggles, form values, component-local data."},
  {t:"State management",d:"easy",q:"What is Pinia in the Vue ecosystem?",o:["A CSS framework for Vue","Vue's official router","Vue's official state management library, replacing Vuex","A Vue testing utility"],c:2,e:"<strong>Pinia = official Vue state library</strong> since Vue 3. It replaced Vuex — simpler API, no mutations layer, first-class TypeScript, modular stores by default."},
  {t:"State management",d:"easy",q:"What is Zustand?",o:["A CSS-in-JS library","The official React state solution from the React team","A server-side rendering framework","A minimal React state library requiring no Provider wrapper"],c:3,e:"<strong>Zustand = minimal, no-ceremony React state.</strong> No Provider, no boilerplate. create() a store, use selectors. Works outside React too. Popular for small-to-medium apps."},
  {t:"State management",d:"easy",q:"Which Vue library is now considered 'legacy'?",o:["Pinia","NgRx","Zustand","Vuex"],c:3,e:"<strong>Vuex is legacy.</strong> Pinia is now the official Vue state library. New Vue projects should use Pinia. Vuex is maintained but no longer recommended."},
  {t:"State management",d:"medium",q:"Why is useContext bad for high-frequency state updates?",o:["useContext only supports primitives","useContext requires Redux to function","Every consumer re-renders when context value changes — no selector mechanism to prevent unnecessary renders","useContext is deprecated in React 18"],c:2,e:"<strong>No fine-grained subscriptions.</strong> Any context update re-renders all consumers — even if their specific data didn't change. Zustand/Pinia solve this with selector-based subscriptions."},
  {t:"State management",d:"medium",q:"What does useReducer add over useState?",o:["Uses Web Workers for performance","Auto-connects to Redux","Centralizes complex state logic in a pure reducer — transitions are explicit and testable","Stores state in sessionStorage"],c:2,e:"<strong>useReducer = complex state transitions in one place.</strong> Dispatch action → reducer computes next state. Easier to test and reason about for multi-step logic."},
  {t:"State management",d:"medium",q:"RTK Query is best suited for?",o:["Managing local UI state like modals","Client-side routing","Fetching, caching, and syncing server data — replaces manual loading/error boilerplate","Replacing Redux entirely for all state"],c:2,e:"<strong>RTK Query = data fetching + caching layer.</strong> Auto-generates hooks, handles loading/error states, caches responses, invalidates on mutation. Replaces manual useEffect API calls."},
  {t:"State management",d:"medium",q:"Main criticism of vanilla Redux?",o:["Only worked with class components","Too slow for production use","Enormous boilerplate — separate files for actions, creators, reducers, and selectors","Didn't support async operations at all"],c:2,e:"<strong>Boilerplate was Redux's biggest pain.</strong> One feature = action type, action creator, reducer case, selector — often across four files. Redux Toolkit's createSlice fixes this."},
  {t:"State management",d:"medium",q:"What does createSlice do in Redux Toolkit?",o:["Creates a database slice","Defines action types, action creators, and a reducer in one place — eliminating boilerplate","Creates a GraphQL schema slice","Lazy-loads the Redux store"],c:1,e:"<strong>createSlice = actions + reducer together.</strong> No more separate action type constants, creator functions, reducer switch cases. One slice = one feature."},
  {t:"State management",d:"medium",q:"Modern Angular alternative to BehaviorSubject services?",o:["useReducer from React","Classic NgRx with RxJS","Angular Signals — signal() and computed() in injectable services","Vue's ref() ported to Angular"],c:2,e:"<strong>Angular Signals (Angular 17+)</strong> give reactive, fine-grained state without RxJS. For small-to-medium apps, no NgRx overhead needed."},
  {t:"State management",d:"medium",q:"When should you NOT use Redux?",o:["App has more than 10 components","You are using React","State is mostly server data — RTK Query, TanStack Query, or SWR handle that far better","You are using TypeScript"],c:2,e:"<strong>Don't Redux-ify server data.</strong> Most historical Redux usage was caching API responses. RTK Query does that better with less code. Reserve Redux for complex local domain logic."},
  {t:"State management",d:"medium",q:"Angular @Input and @Output decorators are used for?",o:["Connecting to a REST API","Global state management","Parent-child communication — data flows down via @Input, events bubble up via @Output","Declaring injectable services"],c:2,e:"<strong>@Input = props from parent; @Output = events to parent.</strong> This is Angular's local component communication. For cross-tree state, use a service or NgRx."},
  {t:"State management",d:"hard",q:"Core guarantee of the Flux unidirectional data flow?",o:["State is persisted to localStorage automatically","Components can directly mutate the store for performance","Every state change comes from a dispatched action — traceable, loggable, and replayable","All API calls are batched into a single round trip"],c:2,e:"<strong>Action → Dispatcher → Store → View. No silent mutation.</strong> Every change is explicit. Enables logging, time-travel debugging, and full auditability of state history."},
  {t:"State management",d:"hard",q:"NgRx Signal Store vs classic NgRx — key difference?",o:["Signal Store only works in Angular 16","Signal Store requires RxJS 8","Signal Store is built on Angular Signals not RxJS — far less boilerplate, no RxJS dependency for state","Signal Store doesn't support side effects"],c:2,e:"<strong>Signal Store drops RxJS for state.</strong> Classic NgRx = Observables everywhere. Signal Store = synchronous Angular Signals. Much less boilerplate; the direction Angular state management is heading."},
  {t:"State management",d:"hard",q:"What does 'fine-grained reactivity' mean in the context of Signals?",o:["Whole component tree re-renders on every signal update","Signals batch all updates per animation frame","Fine-grained means signals only work with primitive values","Only the exact expression or component that reads a signal re-renders — no selector memoization needed"],c:3,e:"<strong>Runtime tracks which UI expressions depend on which signals.</strong> Only those exact reads update when the signal changes — not the whole component or subtree. Different from Redux where selectors must be memoized."},
  {t:"State management",d:"hard",q:"Why is Pinia simpler than Vuex?",o:["Pinia uses REST internally","Pinia auto-stores state in localStorage","Pinia removes the mutations layer — actions can be async directly, reducing three layers to two","Pinia doesn't support TypeScript"],c:2,e:"<strong>Vuex: state + mutations (sync only) + actions (async) = three hops to update state asynchronously.</strong> Pinia collapses this: state + getters + actions (async directly). Simpler, first-class TS, modular."},
  {t:"State management",d:"hard",q:"What does Immer do inside Redux Toolkit?",o:["Connects Redux to React automatically","Handles async API calls","Allows writing 'mutating' code in reducers that secretly stays immutable — no manual spread needed","Compresses the Redux store for performance"],c:2,e:"<strong>Immer = write mutating code, get immutable result.</strong> state.count++ looks mutable but Immer intercepts it, producing a new immutable object. No more { ...state, count: state.count+1 }."},
  {t:"State management",d:"hard",q:"Most apps in 2026 use which state pattern?",o:["Full Redux for everything","Context API only — no external libraries","No state management at all — just prop drilling","Server-state library plus a small global store — full Redux is often overkill"],c:3,e:"<strong>Combination approach wins.</strong> RTK Query/TanStack Query for server data. Zustand/Pinia/Signals service for global UI state. Full Redux reserved for complex domain logic with many actors."},
  {t:"State management",d:"hard",q:"Vue provide/inject vs Pinia — when does provide/inject fall short?",o:["provide/inject doesn't support TypeScript","provide/inject only works in Options API","No enforced structure or devtools — in large teams, state flows become hard to trace and debug","provide/inject is slower than Pinia"],c:2,e:"<strong>provide/inject lacks structure and tooling.</strong> No devtools, no enforced pattern. Fine for theme/locale. For app-wide state with many writers, Pinia's explicit stores + devtools integration wins."}
];

const TOPICS = [...new Set(Q.map(q=>q.t))];
const DIFFS = ['easy','medium','hard'];
let fT='all', fD='all', pool=[], cur=0, answered=false, score=0, results=[];

function gpool() {
  return Q.filter(q=>(fT==='all'||q.t===fT)&&(fD==='all'||q.d===fD)).sort(()=>Math.random()-.5);
}

function dtag(d) {
  return d==='easy'?'tag-easy':d==='medium'?'tag-medium':'tag-hard';
}

function renderStart() {
  const tc={}, dc={easy:0,medium:0,hard:0};
  TOPICS.forEach(t=>tc[t]=Q.filter(q=>q.t===t).length);
  Q.forEach(q=>dc[q.d]++);
  document.getElementById('app').innerHTML=`
  <div class="start-hero"><div class="hero-num">100</div><div class="hero-sub">questions · 7 topics · 3 difficulty levels</div></div>
  <div class="section-label">Filter by topic</div>
  <div class="pill-wrap" id="tp">
    <button class="pill on" onclick="sT('all',this,'tp')">All (${Q.length})</button>
    ${TOPICS.map(t=>`<button class="pill" onclick="sT('${t}',this,'tp')">${t} (${tc[t]})</button>`).join('')}
  </div>
  <div class="section-label">Filter by difficulty</div>
  <div class="pill-wrap" id="dp">
    <button class="pill on" onclick="sD('all',this,'dp')">All (${Q.length})</button>
    ${DIFFS.map(d=>`<button class="pill" onclick="sD('${d}',this,'dp')">${d} (${dc[d]})</button>`).join('')}
  </div>
  <div class="q-count" id="qc">${Q.length} questions ready</div>
  <button class="btn-start" onclick="startQ()">Start quiz</button>`;
}

function sT(v,el,g){fT=v;document.querySelectorAll('#'+g+' .pill').forEach(b=>b.classList.remove('on'));el.classList.add('on');upC();}
function sD(v,el,g){fD=v;document.querySelectorAll('#'+g+' .pill').forEach(b=>b.classList.remove('on'));el.classList.add('on');upC();}
function upC(){const n=gpool().length;const el=document.getElementById('qc');if(el)el.textContent=n+' question'+(n===1?'':'s')+' ready';}

function startQ(){
  pool=gpool();
  if(!pool.length){alert('No questions match your filters.');return;}
  cur=0;score=0;results=[];answered=false;renderQ();
}

function renderQ(){
  const q=pool[cur];
  const pct=Math.round(cur/pool.length*100);
  document.getElementById('app').innerHTML=`
  <div class="prog-row"><span>Q${cur+1} of ${pool.length}</span><span>${score} correct</span></div>
  <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
  <div class="qcard">
    <div class="meta-row"><span class="tag tag-topic">${q.t}</span><span class="tag ${dtag(q.d)}">${q.d}</span></div>
    <div class="q-text">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((o,i)=>`<div class="opt" id="o${i}" onclick="pick(${i})"><span class="ltr">${['A','B','C','D'][i]}</span><span class="opt-text">${o}</span></div>`).join('')}
    </div>
    <div class="exp-box" id="exp"><p>${q.e}</p></div>
  </div>
  <div class="footer">
    <span>${Math.round(cur/pool.length*100)}% through</span>
    <button class="btn-next" id="nb" onclick="nxt()" disabled>${cur+1===pool.length?'See results':'Next'}</button>
  </div>`;
  answered=false;
}

function pick(i){
  if(answered)return;answered=true;
  const q=pool[cur];
  document.querySelectorAll('.opt').forEach(o=>o.onclick=null);
  if(i===q.c){document.getElementById('o'+i).classList.add('correct');score++;results.push({q:q.q,t:q.t,ok:true});}
  else{document.getElementById('o'+i).classList.add('wrong');document.getElementById('o'+q.c).classList.add('show-correct');results.push({q:q.q,t:q.t,ok:false});}
  document.getElementById('exp').style.display='block';
  document.getElementById('nb').disabled=false;
}

function nxt(){cur++;if(cur>=pool.length){renderScore();return;}answered=false;renderQ();}

function renderScore(){
  const pct=Math.round(score/pool.length*100);
  const msg=pct>=80?'Quiz ready! 🎯':pct>=60?'Solid — review the misses below.':'Keep studying — focus on the red ones.';
  const ts={};
  results.forEach(r=>{if(!ts[r.t])ts[r.t]={ok:0,n:0};ts[r.t].n++;if(r.ok)ts[r.t].ok++;});
  document.getElementById('app').innerHTML=`
  <div class="score-hero">
    <div class="score-big">${score}/${pool.length}</div>
    <div class="score-pct">${pct}% correct</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="section-label">By topic</div>
  <div class="topic-grid">
    ${Object.entries(ts).map(([t,s])=>`
    <div class="tcrd">
      <div class="tname">${t}</div>
      <div class="tscore">${s.ok}/${s.n}</div>
      <div class="tbar-wrap"><div class="tbar" style="width:${Math.round(s.ok/s.n*100)}%"></div></div>
    </div>`).join('')}
  </div>
  <div class="section-label">All questions</div>
  <div class="all-results">
    ${results.map(r=>`<div class="result-row"><div class="rdot ${r.ok?'ok':'no'}"></div><div class="rq">${r.q}</div></div>`).join('')}
  </div>
  <div class="btn-row">
    <button class="btn-start" onclick="retry()">Retry this set</button>
    <button class="btn-sec" onclick="back()">Change filters</button>
  </div>`;
}

function retry(){pool=pool.sort(()=>Math.random()-.5);cur=0;score=0;results=[];answered=false;renderQ();}
function back(){renderStart();}

renderStart();
</script>
